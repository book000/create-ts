name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install npm@^11.5.1
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: Bump version and create tag
        id: tag-version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          initial_version: 0.1.0
          custom_release_rules: feat:minor,fix:patch,docs:patch,chore:patch,refactor:patch,build:patch,ci:patch,revert:patch,style:patch,test:patch

      - name: Update package.json version
        run: pnpm version --no-git-tag-version ${{ steps.tag-version.outputs.new_version }}

      - name: Build
        run: pnpm run build

      - name: Verify dist/index.mjs exists
        run: test -f dist/index.mjs

      - name: Pack and verify dist/index.mjs is included
        run: |
          pnpm pack
          tar -tzf *.tgz | grep dist/index.mjs

      - name: Lint
        run: pnpm run lint

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.tag-version.outputs.new_tag }}
          name: ${{ steps.tag-version.outputs.new_tag }}
          body: ${{ steps.tag-version.outputs.changelog }}
